name: Build Fonts

on:
  pull_request:
    paths:
      - 'src/**'
      - 'helpers/**'
      - 'vendor/**'
      - 'data/**'
      - 'font/VERSION'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'helpers/**'
      - 'vendor/**'
      - 'data/**'
      - 'font/VERSION'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y inkscape

      - name: Install Python dependencies
        run: pip install nanoemoji picosvg fonttools lxml

      - name: Assign codepoints
        run: python3 helpers/assign-codepoints.py

      - name: Clean upstream SVGs
        run: python3 helpers/clean-sources.py

      - name: Prepare font-ready SVGs
        run: npm run prepare-fonts

      - name: Upload prepared SVGs
        uses: actions/upload-artifact@v4
        with:
          name: prepared-svgs
          path: |
            color/svg/
            data/codepoint-map.json
            data/icons.json
          retention-days: 1

  build-formats:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - format: ttf
            methods: '["glyf", "glyf_colr_1"]'
          - format: otf
            methods: '["cff_colr_1", "cff2_colr_1"]'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y woff2 inkscape

      - name: Install Python dependencies
        run: pip install nanoemoji picosvg fonttools lxml

      - name: Download prepared SVGs
        uses: actions/download-artifact@v4
        with:
          name: prepared-svgs
          path: .

      - name: Build ${{ matrix.format }} formats
        run: |
          python3 helpers/generate-fonts-runner.py build "${{ github.ref_name }}" '${{ matrix.methods }}'

      - name: Upload font artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fonts-${{ matrix.format }}
          path: font/
          retention-days: 1

  # Separate job for woff2 compression (depends on both ttf and otf being done)
  compress-woff2:
    needs: build-formats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y woff2

      - name: Download font artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fonts-*
          path: font/
          merge-multiple: true

      - name: Re-compress all fonts as WOFF2
        run: |
          find font/ -type f \( -name '*.ttf' -o -name '*.otf' \) | while read f; do
            woff2_compress "$f" && echo "Compressed: $f"
          done

      - name: Upload all fonts
        uses: actions/upload-artifact@v4
        with:
          name: fonts-all
          path: font/
          retention-days: 1

  assemble:
    needs: [build-formats, compress-woff2]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fonts-*
          path: font/
          merge-multiple: true

      - name: Verify artifacts
        run: |
          find font/ -type f \( -name '*.ttf' -o -name '*.woff2' \) | sort

      - name: Generate metadata
        run: |
          python3 helpers/assign-codepoints.py
          python3 helpers/extract-glyphs.py metadata > font/metadata.json

      - name: Generate package README
        run: python3 helpers/generate-package-readme.py > font/README.adoc

      - name: Upload font artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fonts
          path: font/
          retention-days: 7

  release:
    needs: assemble
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: fonts
          path: font/

      - name: Read version
        id: version
        run: |
          VERSION=$(cat font/VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package fonts
        run: cd font && zip -r "MetFont-v${{ steps.version.outputs.version }}.zip" .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "MetFont v${{ steps.version.outputs.version }}"
          files: font/MetFont-v${{ steps.version.outputs.version }}.zip
          make_latest: true
